name: Build BillieJeanMac

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: BillieJeanMac
          path: build/BillieJeanMac
